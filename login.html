<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Game Réduction</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body>

    <!-- Header / Menu de navigation -->
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="shop.html">Boutique</a></li>
                <li><a href="about.html">À propos</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="register.html">S'inscrire</a></li>
            </ul>
        </nav>
    </header>

    <!-- Formulaire de connexion -->
    <section class="auth-section">
        <h2>Se connecter</h2>
        <form id="login-form">
            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required placeholder="Votre email">

            <label for="password">Mot de passe :</label>
            <input type="password" id="password" name="password" required placeholder="Votre mot de passe">

            <button type="submit" class="btn-submit">Se connecter</button>
        </form>
        <p>Pas encore de compte ? <a href="register.html">Inscrivez-vous ici</a></p>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Game Réduction. Tous droits réservés.</p>
    </footer>

    <script src="scripts/auth.js"></script>
</body>
</html>
